mandatoryAccounts:
  - name: Management
    email: aws-management@enterprise.org
    organizationalUnit: Management
    description: AWS Organization Management Account. Root billing and consolidated reporting.
  - name: LogArchive
    email: aws-log-archive@enterprise.org
    organizationalUnit: Security
    description: Immutable centralized log repository. Receives all CloudTrail and Config logs.
  - name: Audit
    email: aws-audit@enterprise.org
    organizationalUnit: Security/DevSecOps
    description: Delegated admin account for Security Hub, GuardDuty, Macie, Inspector, and Audit Manager.
  - name: Network
    email: aws-network@enterprise.org
    organizationalUnit: Infrastructure/Network
    description: Hub networking account. Owns Transit Gateways, Network Firewall, and centralized egress.
  - name: SharedServices
    email: aws-shared-services@enterprise.org
    organizationalUnit: Infrastructure/SharedServices
    description: Shared platform services — Route53 Resolver, Active Directory, internal NTP, HashiCorp Vault.

