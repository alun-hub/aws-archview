        ipv4CidrBlock: 10.30.22.0/24
    transitGatewayAttachments:
      - name: Aurora-Prod-Attach
        transitGateway:
          name: Hub-TGW
          account: Network
        routeTableAssociations:
          - routeTableName: Workloads-RT
        routeTablePropagations:
          - routeTableName: Workloads-RT
        subnets:
          - Aurora-TGW-Subnet-A
          - Aurora-TGW-Subnet-B
