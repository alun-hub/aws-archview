transitGateways:
  # ── EU West (Primary) ────────────────────────────────────────────────────────
  - name: Hub-TGW
    account: Network
    region: eu-west-1
    asn: 64512
    defaultRouteTableAssociation: disable
    defaultRouteTablePropagation: disable
    autoAcceptSharingAttachments: enable
    shareTargets:
      organizationalUnits:
        - Workloads
        - Infrastructure
      accounts:
        - SharedServices
        - DevOpsTooling

  # ── EU North (DR / Nordic) ───────────────────────────────────────────────────
  - name: Hub-TGW-North
    account: Network
    region: eu-north-1
    asn: 64514
    defaultRouteTableAssociation: disable
    defaultRouteTablePropagation: disable
    autoAcceptSharingAttachments: enable
    shareTargets:
      organizationalUnits:
        - Workloads
      accounts:
        - SharedServices

  # ── US East (Global) ─────────────────────────────────────────────────────────
  - name: Hub-TGW-US
    account: Network
    region: us-east-1
    asn: 64513
    defaultRouteTableAssociation: disable
    defaultRouteTablePropagation: disable
    autoAcceptSharingAttachments: enable
    shareTargets:
      organizationalUnits:
        - Workloads

transitGatewayRouteTables:
  # ── eu-west-1 ────────────────────────────────────────────────────────────────
  - name: Core-RT
    transitGateway:
      name: Hub-TGW
      account: Network
  - name: Inspection-RT
    transitGateway:
      name: Hub-TGW
      account: Network
  - name: SharedServices-RT
    transitGateway:
      name: Hub-TGW
      account: Network
  - name: Production-RT
    transitGateway:
      name: Hub-TGW
      account: Network
  - name: NonProd-RT
    transitGateway:
      name: Hub-TGW
      account: Network
  - name: OnPrem-RT
    transitGateway:
      name: Hub-TGW
      account: Network

  # ── eu-north-1 ───────────────────────────────────────────────────────────────
  - name: Core-RT-North
    transitGateway:
      name: Hub-TGW-North
      account: Network
  - name: DR-RT-North
    transitGateway:
      name: Hub-TGW-North
      account: Network

  # ── us-east-1 ────────────────────────────────────────────────────────────────
  - name: Core-RT-US
    transitGateway:
      name: Hub-TGW-US
      account: Network
  - name: Production-RT-US
    transitGateway:
      name: Hub-TGW-US
      account: Network

customerGateways:
  # ── HQ Office — Dublin ───────────────────────────────────────────────────────
  - name: HQ-Office-Dublin
    account: Network
    region: eu-west-1
    ipAddress: 198.51.100.5
    asn: 65111
    vpnConnections:
      - name: VPN-HQ-Dublin-to-TGW
        transitGateway: Hub-TGW
        routeTableAssociations:
          - routeTableName: OnPrem-RT
        routeTablePropagations:
          - routeTableName: OnPrem-RT
          - routeTableName: Production-RT
          - routeTableName: SharedServices-RT
        staticRoutesOnly: false
        tunnelSpecifications:
          - tunnelInsideCidr: 169.254.10.0/30
          - tunnelInsideCidr: 169.254.10.4/30

  # ── Data Center — Stockholm (Primary DC) ─────────────────────────────────────
  - name: DC-Stockholm
    account: Network
    region: eu-west-1
    ipAddress: 203.0.113.42
    asn: 65222
    vpnConnections:
      - name: VPN-DC-Stockholm-Primary
        transitGateway: Hub-TGW
        routeTableAssociations:
          - routeTableName: OnPrem-RT
        routeTablePropagations:
          - routeTableName: OnPrem-RT
          - routeTableName: Production-RT
          - routeTableName: SharedServices-RT
          - routeTableName: Core-RT
        staticRoutesOnly: false
        tunnelSpecifications:
          - tunnelInsideCidr: 169.254.20.0/30
          - tunnelInsideCidr: 169.254.20.4/30
      - name: VPN-DC-Stockholm-DR
        transitGateway: Hub-TGW-North
        routeTableAssociations:
          - routeTableName: Core-RT-North
        routeTablePropagations:
          - routeTableName: Core-RT-North
          - routeTableName: DR-RT-North
        staticRoutesOnly: false
        tunnelSpecifications:
          - tunnelInsideCidr: 169.254.30.0/30
          - tunnelInsideCidr: 169.254.30.4/30

  # ── Data Center — Frankfurt (Backup DC) ──────────────────────────────────────
  - name: DC-Frankfurt
    account: Network
    region: eu-west-1
    ipAddress: 203.0.113.99
    asn: 65333
    vpnConnections:
      - name: VPN-DC-Frankfurt-to-TGW
        transitGateway: Hub-TGW
        routeTableAssociations:
          - routeTableName: OnPrem-RT
        routeTablePropagations:
          - routeTableName: OnPrem-RT
          - routeTableName: Production-RT
        staticRoutesOnly: true
        tunnelSpecifications:
          - tunnelInsideCidr: 169.254.40.0/30
          - tunnelInsideCidr: 169.254.40.4/30

vpcPeering:
  - name: SharedServices-to-AuroraProd
    vpcs:
      - SharedServices-VPC
      - Aurora-Prod-VPC
  - name: SharedServices-to-NebulaProd
    vpcs:
      - SharedServices-VPC
      - Nebula-Prod-VPC
  - name: Phoenix-to-Apex
    vpcs:
      - Phoenix-Prod-VPC
      - Apex-Prod-VPC

