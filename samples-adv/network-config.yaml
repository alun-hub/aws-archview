      - name: Network-VPC-Attach
        transitGateway:
          name: Hub-TGW
          account: Network
        routeTableAssociations:
          - routeTableName: Core-RT
        routeTablePropagations:
          - routeTableName: Core-RT
        subnets:
          - TGW-Attach-Subnet-A
          - TGW-Attach-Subnet-B
          - TGW-Attach-Subnet-C
