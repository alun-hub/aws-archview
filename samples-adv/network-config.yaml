transitGateways:
  - name: Hub-TGW
    account: Network
    region: eu-west-1
    asn: 64512
    defaultRouteTableAssociation: disable
    defaultRouteTablePropagation: disable
    autoAcceptSharingAttachments: enable
    shareTargets:
      organizationalUnits:
        - Workloads
      accounts:
        - SharedServices

  - name: Hub-TGW-US
    account: Network
    region: us-east-1
    asn: 64513
    defaultRouteTableAssociation: disable
    defaultRouteTablePropagation: disable
    autoAcceptSharingAttachments: enable
    shareTargets:
      organizationalUnits:
        - Workloads

transitGatewayRouteTables:
  # eu-west-1 route tables
  - name: Core-RT
    transitGateway:
      name: Hub-TGW
      account: Network
  - name: SharedServices-RT
    transitGateway:
      name: Hub-TGW
      account: Network
  - name: Workloads-RT
    transitGateway:
      name: Hub-TGW
      account: Network

  # us-east-1 route tables
  - name: Core-RT-US
    transitGateway:
      name: Hub-TGW-US
      account: Network
  - name: Workloads-RT-US
    transitGateway:
      name: Hub-TGW-US
      account: Network

customerGateways:
  - name: HQ-Office
    account: Network
    region: eu-west-1
    ipAddress: 198.51.100.5
    asn: 65111
    vpnConnections:
      - name: VPN-HQ-to-TGW
        transitGateway: Hub-TGW
        routeTableAssociations:
          - routeTableName: Core-RT
        routeTablePropagations:
          - routeTableName: Core-RT
          - routeTableName: Workloads-RT
          - routeTableName: SharedServices-RT
        staticRoutesOnly: false
        tunnelSpecifications:
          - tunnelInsideCidr: 169.254.10.0/30
          - tunnelInsideCidr: 169.254.10.4/30

